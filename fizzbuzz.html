<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kata FizzBuzz</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #f8fafc;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .card {
        background: rgba(15, 23, 42, 0.95);
        border-radius: 18px;
        padding: 24px;
        width: min(900px, 100%);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
      }
      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-bottom: 16px;
      }
      button {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        font-size: 1rem;
        cursor: pointer;
        font-weight: 600;
      }
      .primary { background: #38bdf8; color: #082f49; }
      .secondary { background: #e2e8f0; color: #0f172a; }
      .output {
        background: #111827;
        border: 1px solid #334155;
        border-radius: 12px;
        padding: 14px;
        min-height: 240px;
        white-space: pre-wrap;
        font-family: Consolas, monospace;
        line-height: 1.5;
      }
      a { color: #38bdf8; }
    </style>
  </head>
  <body>
    <main class="card">
      <h1>Kata FizzBuzz</h1>
      <p>Esta página ejecuta la kata y muestra los resultados en pantalla.</p>
      <div class="actions">
        <button class="primary" id="runBtn">Ejecutar kata</button>
        <button class="secondary" id="showBtn">Ver resultados</button>
      </div>
      <div class="output" id="output">Pulsa “Ejecutar kata” para ver la salida.</div>
      <p><a href="./index.html">Volver al inicio</a></p>
    </main>

    <script src="./fizzbuzz.js"></script>
    <script>
      const output = document.getElementById('output');
      const runBtn = document.getElementById('runBtn');
      const showBtn = document.getElementById('showBtn');

      function renderResults() {
        const results = window.fizzBuzzZeroToHundred ? window.fizzBuzzZeroToHundred() : [];
        output.textContent = results.join('\n');
      }

      runBtn.addEventListener('click', () => {
        output.textContent = 'Ejecutando kata...';
        setTimeout(renderResults, 100);
      });

      showBtn.addEventListener('click', renderResults);
    </script>
  </body>
</html>
