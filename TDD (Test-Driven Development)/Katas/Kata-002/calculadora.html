<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculadora</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0f172a, #111827);
        color: #f8fafc;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 20px;
      }
      .calculator {
        width: min(92vw, 360px);
        background: #111827;
        border-radius: 20px;
        padding: 18px;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.3);
      }
      .display {
        background: #f3f4f6;
        color: #111827;
        min-height: 72px;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 14px;
        font-size: 2rem;
        text-align: right;
        overflow-x: auto;
      }
      .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
      button { border: 0; border-radius: 12px; padding: 14px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
      .operator { background: #f59e0b; color: #111827; }
      .number { background: #374151; color: #f9fafb; }
      .action { background: #6b7280; color: #f9fafb; }
      .equal { background: #10b981; color: white; }
    </style>
  </head>
  <body>
    <main class="calculator">
      <div class="display" id="display">0</div>
      <div class="buttons">
        <button class="action" data-action="clear">C</button>
        <button class="action" data-action="delete">⌫</button>
        <button class="action" data-action="percent">%</button>
        <button class="operator" data-op="/">÷</button>
        <button class="number" data-value="7">7</button>
        <button class="number" data-value="8">8</button>
        <button class="number" data-value="9">9</button>
        <button class="operator" data-op="*">×</button>
        <button class="number" data-value="4">4</button>
        <button class="number" data-value="5">5</button>
        <button class="number" data-value="6">6</button>
        <button class="operator" data-op="-">−</button>
        <button class="number" data-value="1">1</button>
        <button class="number" data-value="2">2</button>
        <button class="number" data-value="3">3</button>
        <button class="operator" data-op="+">+</button>
        <button class="number" data-value="0">0</button>
        <button class="number" data-value=".">.</button>
        <button class="equal" data-action="equals">=</button>
        <button class="action" data-action="toggle-sign">±</button>
      </div>
    </main>
    <script src="./calculadora.js"></script>
  </body>
</html>
